<!DOCTYPE html>
<html>
    <head>
        <script src = "/pages/index.js"></script>
        <style>
            html{
                font-family:  'Lucida Grande', 'Calibri', Helvetica, Arial, sans-serif;
                height: 100%;
                padding: 0;
                margin: 0;
                font-size: 100%;
            }
            body{
                height: 100%;
                padding: 0;
                margin: 0;
            }
            header{
                color: #fff;
                height: 220px;;
                background: linear-gradient(to top, #373737, #212121);
            }
            header header-element[level="1"]{
                margin-top: 1.5rem;
            }
            header header-element[level="5"]{
                margin-top: 1rem;
                font-weight: 300;
            }
            header .zip{
                display: block;
                margin-top: 30px;
            }
            header section{
                height: 100%;
            }
            section{
                position: relative;
                padding: 20px 10px;
                width: 600px;
                margin: 0 auto;
            }
            .view-github{
                position: absolute;
                right: 0;
                top: 0;
            }
            tree-view{
                font-size: 16px;
                font-weight: 300;
            }
            @font-face {
                font-family: 'Icons';
                src: url('/stories/assets/icons.woff2') format('woff2');
                font-weight: normal;
                font-style: normal;
            }
            /* fallback */
            @font-face {
                font-family: 'Material Icons';
                font-style: normal;
                font-weight: 400;
                src: url('/stories/assets/material.woff2') format('woff2');
            }
        </style>
    </head>
    <body>
        <header>
            <section>
                <header-element level = "1">UI Lit</header-element>
                <header-element level = "5">Web-components UI library based on Lit 2.0</header-element>
                <a class = "view-github"
                    href = "https://github.com/kaifaty/ui-lit" 
                    target="_blank">
                    <button-element  primary>
                        View on GitHub
                        <img slot = 'icon-after' src = "https://pages-themes.github.io/slate/assets/images/blacktocat.png"/>
                    </button-element>
                </a>
                <a class = "zip" 
                    href = "https://github.com/kaifaty/ui-lit/archive/refs/heads/main.zip">
                    <button-element success>Download .zip</button-element>
                </a>
            </section>
        </header>
        <main>
            <section>
                <header-element class = "storybook" level = "3" center>
                    <link-element 
                        class = "storybook-link" 
                        href = "/storybook-static" 
                        target = "_blank">Check in Storybook</link-element>
                </header-element>
                <header-element level = "2">Features:</header-element>
                <ul>
                    <li>Small: ~30kb gzip</li>
                    <li>Based on web-components</li>
                    <li>Form-associated elements</li>
                </ul>
                
                <header-element level = "2">Getting started:</header-element>
                <code-element>
                    <code-line>npm i ui-lit</code-line>       
                </code-element>
                <code-element>
                    <code-line>yarn add ui-lit</code-line>       
                </code-element>
                <tree-view selected = "main" >
                    <tree-item value = "main" label = "Main"></tree-item>
                    <tree-item value = "second" label = "Second item"></tree-item>
                    <tree-item label = "Third item">
                        <tree-item value = "subItem1" label = "SubItem 1"></tree-item>
                        <tree-item value = "subItem2" label = "SubItem 2"></tree-item>
                    </tree-item>
                </tree-view>
            </section>
        </main>
    </body>
    
</html>
