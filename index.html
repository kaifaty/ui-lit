<!DOCTYPE html>
<html>
    <head>
        <script src = "src/index.ts"></script>
        <style>

            html{
                font-size: 14px;
                font-family: Arial, Helvetica, sans-serif;
            }
            @font-face {
                font-family: 'Icons';
                src: url('/icons.woff2?v=77') format('woff2');
                font-weight: normal;
                font-style: normal;
            }
        </style>
    </head>
    <body>
        <form-element>
            <div style = "display: grid; grid-template-columns: auto auto; gap: 6px; width: 300px;">
                <text-field id = "text-1" name = "test" minlength = "5" value = "3"></text-field>
                <button-element outline type = "submit" iconAfter = "" iconBefore = "G">Submit</button-element>
            </div>
        </form-element>
    </body>
    <script>
        document.querySelector("form-element").addEventListener("submit", e => {
            console.log(e.target)
            const btn = document.querySelector("button-element");
            if(!btn.error){
                btn.setAttribute('error', '');
            }
            else{
                btn.removeAttribute('error');
            }
            
        })
    </script>
</html>
